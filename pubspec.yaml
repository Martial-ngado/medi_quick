name: pharma
description: "A new Flutter project."

# Prevents accidental publishing to pub.dev
publish_to: 'none'

# App version
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  #upload docs
  file_picker: ^8.1.2

  # Network
  http: ^1.2.0
  dio: ^5.4.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^2.1.1

  # Storage, allows to store data locally
  shared_preferences: ^2.2.2

  # Payment
  flutter_stripe: ^10.1.1

  # Images
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4

  #firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.0
  firebase_database: ^11.2.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
